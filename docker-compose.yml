services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finserv_pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finserv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finserv_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-compliance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finserv} -d ${POSTGRES_DB:-compliance}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
